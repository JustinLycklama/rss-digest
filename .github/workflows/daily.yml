name: Daily RSS Digest

on:
  schedule:
    - cron: '0 10 * * *'  # 10am UTC = 6am EDT, runs every day
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore archives from gh-pages
        run: |
          mkdir -p output
          BASE="https://raw.githubusercontent.com/${{ github.repository }}/gh-pages"
          for archive in news_archive.json toronto_events_archive.json starcraft_archive.json shambhala_archive.json; do
            curl -f -s -o "output/$archive" "$BASE/$archive" || echo "No $archive found, starting fresh"
          done

      - name: Run pipeline
        run: python pipeline.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}

      - name: Deploy output to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          force_orphan: true
