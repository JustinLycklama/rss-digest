name: Daily RSS Digest

on:
  schedule:
    - cron: '0 12 * * *'  # noon UTC = 8am EDT, runs every day
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Reddit RSS feeds
        run: python run_generate_reddit_rss.py

      - name: Restore news archive from gh-pages
        run: |
          mkdir -p output
          curl -f -s -o output/news_archive.json \
            https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/news_archive.json \
            || echo "No archive found, starting fresh"

      - name: Run custom scrapers (includes news digest)
        run: python run_custom_scrapers.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}

      - name: Deploy output to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          force_orphan: true  # single commit, no history — matches existing --amend approach
