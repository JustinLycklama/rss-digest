name: Weekly Media Recommendations

on:
  schedule:
    - cron: '0 14 * * 1'  # Monday 2pm UTC = 10am EDT
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore archives from gh-pages
        run: |
          mkdir -p output
          BASE="https://raw.githubusercontent.com/${{ github.repository }}/gh-pages"
          curl -f -s -o "output/media_recs_archive.json" "$BASE/media_recs_archive.json" || echo "No media_recs_archive.json found, starting fresh"

      - name: Run pipeline
        run: python pipeline.py --feeds media_recs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}

      - name: Deploy output to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: true
